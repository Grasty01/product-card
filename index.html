<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>My product card</title>
  </head>
  <body>
    <h1 class="page-title">Mon Catalogue Produits</h1>
    <article>
      <header class="card-header">
        <img src="" alt="Appareil photo hybride Sony Alpha 7C II noir" />
        <div class="card-badge">-25%</div>
      </header>
      <div class="card-body">
        <p>Photographie</p>
        <h2>Sony Alpha 7C II</h2>
        <p class="card-description">
          Appareil photo hybride plein format compact. Autofocus IA avancé,
          stabilisation 7 stops, vidéo 4K 60fps — dans un boîtier de 514 g.
        </p>
      </div>
      <footer class="card-footer">
        <div>
          <p>15 000 FCFA</p>
          <p>En stock</p>
        </div>
        <button class="card-btn">Ajouter au panier</button>
      </footer>
    </article>
  </body>
</html>
